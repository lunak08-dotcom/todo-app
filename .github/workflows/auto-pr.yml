name: feature 브랜치 PR 자동 생성

on:
  push:
    branches:
      - 'feature/**'   # feature/로 시작하는 브랜치에 push될 때 실행

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 이미 PR이 있는지 확인
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --head "${{ github.ref_name }}" --base master --json number --jq length)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: PR 자동 생성
        if: steps.check-pr.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base master \
            --head "${{ github.ref_name }}" \
            --title "[${{ github.ref_name }}] 자동 생성 PR" \
            --body "## 자동 생성된 PR

          - **브랜치**: \`${{ github.ref_name }}\`
          - **작성자**: ${{ github.actor }}
          - **커밋**: ${{ github.sha }}

          ---
          > 이 PR은 GitHub Actions에 의해 자동 생성되었습니다.
          > 코드 리뷰 후 머지해주세요."
