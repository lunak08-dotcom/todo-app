name: master 머지 시 index.html 자동 동기화

on:
  push:
    branches:
      - master          # master에 push(머지 포함)될 때 실행
    paths:
      - 'todo.html'     # todo.html이 변경될 때만 실행

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: todo.html → index.html 복사
        run: cp todo.html index.html

      - name: 변경 여부 확인
        id: check
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: index.html 커밋 & 푸시
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: sync index.html from todo.html [skip ci]"
          git push
